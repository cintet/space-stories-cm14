- type: entity
  parent: RMCBaseWindowFrame
  id: RMCWindowFrameSolaris
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/Frames/solaris_frame.rsi
    state: solaris_frame0
  - type: Icon
    sprite: _RMC14/Structures/Windows/Frames/solaris_frame.rsi
    state: solaris_frame0
  - type: IconSmooth
    key: window
    base: solaris_frame
    mode: CardinalFlags

- type: entity
  parent: RMCBaseWindowFrame
  id: RMCWindowFrameSolarisReinforced
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/Frames/solaris_rframe.rsi
    state: solaris_frame0
  - type: Icon
    sprite: _RMC14/Structures/Windows/Frames/solaris_rframe.rsi
    state: solaris_frame0
  - type: IconSmooth
    key: window
    base: solaris_frame
    mode: CardinalFlags

- type: entity
  parent: CMBaseWindow
  id: CMWindowSolaris
  name: window
  description: A glass window inside a wall frame.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/solaris_window.rsi
    state: solaris_window0
  - type: Icon
    sprite: _RMC14/Structures/Windows/solaris_window.rsi
    state: solaris_window0
  - type: IconSmooth
    key: window
    base: solaris_window
    mode: CardinalFlags
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCWindowFrameSolaris:
            min: 1
            max: 1
          CMShardGlass:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: CMBaseWindow
  id: CMWindowSolarisReinforced
  name: reinforced window
  description: A glass window. The inside is reinforced with a few tempered matrix rods along the base. It looks rather strong. Might take a few good hits to shatter it.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/solaris_rwindow.rsi
    state: solaris_rwindow0
  - type: Icon
    sprite: _RMC14/Structures/Windows/solaris_rwindow.rsi
    state: solaris_rwindow0
  - type: IconSmooth
    key: window
    base: solaris_rwindow
    mode: CardinalFlags
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCWindowFrameSolarisReinforced:
            min: 1
            max: 1
          CMShardGlass:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: CMWindowSolarisReinforced
  id: CMWindowSolarisHull
  description: A glass window. Something tells you this one is somehow indestructible.
  # TODO RMC14 1000000 hp
