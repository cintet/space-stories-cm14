- type: entity
  parent: [STHunterBaseItem, RMCBeltBaseStorageNoVisuals]
  id: STHunterPouch
  name: hunting pouch
  description: A hunting pouch worn around the waist, made from a thick tanned hide. Capable of holding various devices and tools and used for the transport of trophies.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Clothing/Back/Backpacks/Hunters/standard.rsi
  - type: Clothing
    sprite: _Stories/Objects/Clothing/Back/Backpacks/Hunters/standard.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,11,3
  - type: FixedItemSizeStorage

- type: entity
  parent: [STHunterBaseItem, CMBeltUtility]
  id: STBeltHunterUtility
  name: alien toolbelt
  description: A modular belt with various clips. This version lacks any hunting functionality, and is commonly used by engineers to transport important tools.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Clothing/Belt/Hunter/utility.rsi
  - type: Clothing
    sprite: _Stories/Objects/Clothing/Belt/Hunter/utility.rsi

- type: entity
  parent: CMBeltUtility
  id: STBeltTank
  name: M103 pattern vehicle ammo rig
  description: The M103 is a limited-issue mark of USCM load-bearing equipment, made specially for crewmen to carry their vehicle's ammunition.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/tankbelt.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/tankbelt.rsi
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots
    whitelist:
      tags:
      - RMCAmmoBox
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCAmmoBox
