- type: entity
  parent: [Clothing, ContentsExplosionResistanceBase]
  id: STWeldingKit
  name: welding kit
  description: A heavy-duty, portable welding fluid carrier.
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: _Stories/Objects/Tanks/welding_kit.rsi
    layers:
    - state: icon
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 600
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 600
  - type: ReagentTank
    tankType: Fuel
  - type: DrainableSolution
    solution: tank
  - type: SolutionTransfer
    transferAmount: 50
    maxTransferAmount: 100
    minTransferAmount: 10
    canChangeTransferAmount: true
  - type: RefillableSolution
    solution: tank
  - type: DrawableSolution
    solution: tank
  - type: RMCSolutionTransferWhitelist
    popup: rmc-solution-transfer-whitelist-failed-not-welding-tank
    sourceWhitelist:
      components:
      - RMCFlamerTank
      - Welder
    targetWhitelist:
      tags:
      - RMCTankFuel
  - type: NoMixingReagents
